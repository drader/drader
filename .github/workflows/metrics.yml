name: Metrics

on:
  # Profil kartını günde bir kez yeniler
  schedule:
    - cron: "0 6 * * *"
  # Manuel tetikleme (Actions sekmesinden "Run workflow")
  workflow_dispatch:
  # README/workflow güncellendiğinde yeniden üret
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: drader
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul

          # --- Diller (detaylı yazılım profili) ---
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming, data
          plugin_languages_colors: github
          plugin_languages_limit: 12
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage

          # --- Kodlama alışkanlıkları + takvim ---
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Başarılar / etkileşim ---
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_traffic: yes
