name: User Statistician

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: userstats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Light theme card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/userstats-light.svg
          colors: light
          commit-and-push: false
          language-repository-exclusions: >-
            project-msctez oneri itu_lisansustu_yonetmelik
            training-patika-datastructures training-system_control
            training-kodluyoruzilkrepo training-STM32F411-demo
            training-altium-ISL6236A_DEMO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dark theme card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/userstats-dark.svg
          colors: dark-dimmed
          commit-and-push: false
          language-repository-exclusions: >-
            project-msctez oneri itu_lisansustu_yonetmelik
            training-patika-datastructures training-system_control
            training-kodluyoruzilkrepo training-STM32F411-demo
            training-altium-ISL6236A_DEMO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images
          git commit -m "Update user statistician cards" || echo "No changes"
          git push
